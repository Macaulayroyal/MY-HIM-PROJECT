<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Lexend', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html { 
            scroll-behavior: smooth;
            height: 100%;
        }

        body {
            background: #ffffff;
            min-height: 100vh;
            padding-bottom: 100px;
            height: 100%;
        }

        /* Header - Mobile Centered */
        .header {
            position: absolute;
            top: 0;

        /* Payment Methods Container - Mobile Full Height */

        /* Visa Section - Mobile: 40% from very top - WHITE BACKGROUND */

            align-items: flex-start;

        }

        .visa-card {

                            margin-top: -3vh;

        /* Unavailable Label */
        .unavailable-label {

        /* Bank Transfer Section - Mobile: 60% - LIGHTER PRIMARY COLOR */

            align-items: flex-start;

            }

            .sidebar-nav {
                display: flex;
                flex-direction: column;
                gap: 16px;
                flex: 1;
            }

            .sidebar-item {
                width: 48px;

            .sidebar-avatar {

            }

            .sidebar-avatar img {

            .sidebar-avatar .placeholder {

            .main-content {

            /* Sidebar Badges */
            .sidebar-badge {

        @media (max-width: 1023px) {

    </style>
</head>

    <script>
        // Supabase Configuration
        const SUPABASE_URL = 'https://ddrhpjiaotwtblnlqytw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkcmhwamlhb3R3dGJsbmxxeXR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NTI0MjMsImV4cCI6MjA4ODMyODQyM30.GNb6OTErsgNbb0PlEysXD7BtUhkjk0ldQCPbO_5EsKU';

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Global State
        let currentUserId = null;
        let cart = [];
        let favorites = [];

        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            await initializeUserData();
            updateBadges();
        });

        async function initializeUserData() {
            try {
                const { data: { session } } = await supabaseClient.auth.getSession();
                
                if (session?.user) {
                    currentUserId = session.user.id;
                    await loadCartFromSupabase();
                    await loadFavoritesFromSupabase();
                } else {
                    currentUserId = localStorage.getItem('tempUserId') || 'temp_' + Math.random().toString(36).substr(2, 9);
                    localStorage.setItem('tempUserId', currentUserId);
                    
                    const savedCart = localStorage.getItem('cart');
                    const savedFavorites = localStorage.getItem('favorites');
                    
                    cart = savedCart ? JSON.parse(savedCart) : [];
                    favorites = savedFavorites ? JSON.parse(savedFavorites) : [];
                    
                    if (!Array.isArray(cart)) cart = [];
                    if (!Array.isArray(favorites)) favorites = [];
                }
            } catch (error) {
                console.error('Error initializing user data:', error);
                const savedCart = localStorage.getItem('cart');
                const savedFavorites = localStorage.getItem('favorites');
                cart = savedCart ? JSON.parse(savedCart) : [];
                favorites = savedFavorites ? JSON.parse(savedFavorites) : [];
                if (!Array.isArray(cart)) cart = [];
                if (!Array.isArray(favorites)) favorites = [];
            }
        }

        async function loadCartFromSupabase() {
            try {
                const { data, error } = await supabaseClient
                    .from('user_cart')
                    .select('*')
                    .eq('user_id', currentUserId);
                
                if (error) throw error;
                
                if (data && data.length > 0) {
                    cart = data.map(item => ({
                        id: item.product_id,
                        name: item.name,
                        price: item.price,
                        image: item.image,
                        quantity: item.quantity,
                        size: item.size,
                        color: item.color,
                        addedAt: item.added_at
                    }));
                    localStorage.setItem('cart', JSON.stringify(cart));
                } else {
                    const savedCart = localStorage.getItem('cart');
                    cart = savedCart ? JSON.parse(savedCart) : [];
                    if (!Array.isArray(cart)) cart = [];
                }
            } catch (error) {
                console.error('Error loading cart from Supabase:', error);
                const savedCart = localStorage.getItem('cart');
                cart = savedCart ? JSON.parse(savedCart) : [];
                if (!Array.isArray(cart)) cart = [];
            }
        }

        async function loadFavoritesFromSupabase() {
            try {
                const { data, error } = await supabaseClient
                    .from('user_favorites')
                    .select('*')
                    .eq('user_id', currentUserId);
                
                if (error) throw error;
                
                if (data && data.length > 0) {
                    favorites = data.map(item => item.product_id);
                    localStorage.setItem('favorites', JSON.stringify(favorites));
                } else {
                    const savedFavorites = localStorage.getItem('favorites');
                    favorites = savedFavorites ? JSON.parse(savedFavorites) : [];
                    if (!Array.isArray(favorites)) favorites = [];
                }
            } catch (error) {
                console.error('Error loading favorites from Supabase:', error);
                const savedFavorites = localStorage.getItem('favorites');
                favorites = savedFavorites ? JSON.parse(savedFavorites) : [];
                if (!Array.isArray(favorites)) favorites = [];
            }
        }

        function updateBadges() {
            const cartTotal = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
            const favTotal = favorites.length;

            const navCartBadge = document.getElementById('navCartBadge');
            const navFavBadge = document.getElementById('navFavBadge');
            
            if (navCartBadge) {
                navCartBadge.textContent = cartTotal;
                navCartBadge.classList.toggle('show', cartTotal > 0);
            }
            
            if (navFavBadge) {
                navFavBadge.textContent = favTotal;
                navFavBadge.classList.toggle('show', favTotal > 0);
            }

            const sidebarCartBadge = document.getElementById('sidebarCartBadge');
            const sidebarFavBadge = document.getElementById('sidebarFavBadge');
            
            if (sidebarCartBadge) {
                sidebarCartBadge.textContent = cartTotal;
                sidebarCartBadge.classList.toggle('show', cartTotal > 0);
            }
            
            if (sidebarFavBadge) {
                sidebarFavBadge.textContent = favTotal;
                sidebarFavBadge.classList.toggle('show', favTotal > 0);
            }
        }
