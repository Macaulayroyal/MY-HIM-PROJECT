<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Recovery - HIM.clothiers</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Lexend', sans-serif;
            scrollbar-width: none;
            -webkit-tap-highlight-color: transparent;
        }

        *::-webkit-scrollbar {
            display: none;
        }

        html {
            height: 100%;
            width: 100%;
        }

        body {
            background: white;
            min-height: 100vh;
            min-height: 100dvh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            overflow-x: hidden;
        }

        .container {
            display: flex;
            background: white;
            overflow: hidden;
            max-width: 1200px;
            width: 100%;
            min-height: 600px;
            height: 100vh;
            height: 100dvh;
        }

        .image-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            min-height: 400px;
        }

        .image-container img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        .image-container img.active {
            opacity: 1;
        }

        .content-container {
            flex: 1;
            padding: 60px 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            width: 100%;
        }

        .profile-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            margin-bottom: 40px;
        }

        .profile-circle {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 4px solid #6F4D38;
            overflow: hidden;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .profile-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-placeholder {
            font-size: 3rem;
            color: #999;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 700;
            color: #000;
            letter-spacing: 1px;
        }

        .description {
            font-size: 1rem;
            font-weight: 300;
            color: #000;
            margin-top: 8px;
        }

        .options-wrapper {
            width: 100%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        .method-toggle {
            width: 100%;
            border-radius: 200px;
            border: 2px solid #f0e1d7;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            background: #fdf7f3;
            transition: all 0.3s ease;
        }

        .method-toggle span.label {
            font-size: 1rem;
            font-weight: 500;
            color: #6F4D38;
        }

        .method-toggle .check-icon {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid #f0e1d7;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            color: transparent;
            font-size: 14px;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .method-toggle.active {
            border-color: #6F4D38;
            background: #f9f0ea;
        }

        .method-toggle.active .check-icon {
            background: #f0e1d7;
            color: #6F4D38;
            border-color: #6F4D38;
        }

        .buttons-row {
            width: 100%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            width: 100%;
            padding: 16px 20px;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 200px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Lexend', sans-serif;
            border: none;
            text-align: center;
            flex-shrink: 0;
        }

        .btn-primary {
            background-color: #6F4D38;
            color: white;
            box-shadow: 0 4px 15px rgba(111, 77, 56, 0.3);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(111, 77, 56, 0.4);
            background-color: #5a3f2d;
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background-color: white;
            color: #000;
            border: 2px solid #e0e0e0;
        }

        .btn-secondary:hover {
            background-color: #f5f5f5;
            border-color: #ccc;
            transform: translateY(-2px);
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid #ffffff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .message {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            display: none;
            max-width: 360px;
            width: 100%;
            font-weight: 400;
            text-align: center;
        }

        .message.error {
            background-color: #fee;
            color: #c33;
            display: block;
        }

        .message.success {
            background-color: #efe;
            color: #3c3;
            display: block;
        }

        /* Desktop */
        @media (min-width: 769px) {
            body {
                padding: 20px;
            }

            .btn {
                width: 100% !important;
                max-width: 360px !important;
            }
        }

        /* Mobile */
        @media (max-width: 768px) {
            body {
                padding: 0;
            }

            .container {
                flex-direction: column;
                border-radius: 0;
                min-height: 100vh;
                min-height: 100dvh;
            }

            .image-container {
                display: none;
            }

            .content-container {
                padding: 60px 24px;
                min-height: 100vh;
                min-height: 100dvh;
                width: 100%;
                justify-content: center;
                padding-top: 100px;
                padding-bottom: 60px;
            }

            .profile-circle {
                width: 100px;
                height: 100px;
            }

            .page-title {
                font-size: 1.875rem;
            }

            .description {
                font-size: 0.95rem;
            }

            .btn {
                padding: 16px 20px;
                border-radius: 25px;
            }

            .message {
                font-size: 0.875rem;
                padding: 12px;
            }
        }

        @media (max-width: 380px) {
            .content-container {
                padding: 50px 20px;
                padding-top: 80px;
                padding-bottom: 50px;
            }

            .profile-circle {
                width: 90px;
                height: 90px;
            }

            .page-title {
                font-size: 1.75rem;
            }
        }

        @media (max-width: 320px) {
            .content-container {
                padding: 40px 16px;
                padding-top: 60px;
                padding-bottom: 40px;
            }

            .profile-circle {
                width: 80px;
                height: 80px;
            }

            .page-title {
                font-size: 1.5rem;
            }

            .message {
                font-size: 0.8rem;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .content-container > * {
            animation: fadeIn 0.6s ease-out forwards;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- LEFT: Rotating images (same as others) -->
        <div class="image-container">
            <img src="img/bg1.jpg" alt="Modern workspace" class="active">
            <img src="img/bg2.jpg" alt="Team collaboration">
            <img src="img/bg1.jpg" alt="Creative meeting">
            <img src="img/bg2.jpg" alt="Team collaboration">
        </div>

        <!-- RIGHT: Password recovery UI -->
        <div class="content-container">
            <div class="profile-wrapper">
                <div class="profile-circle" id="profileCircle">
                    <img src="" alt="Profile" id="profileImg" style="display:none;">
                    <div class="profile-placeholder" id="profilePlaceholder">👤</div>
                </div>
                <h1 class="page-title">Password Recovery</h1>
                <p class="description">How would you like to restore your password?</p>
            </div>

            <div class="options-wrapper">
                <div class="method-toggle" id="smsOption" onclick="selectMethod('sms')">
                    <span class="label">SMS</span>
                    <div class="check-icon">✓</div>
                </div>
                <div class="method-toggle active" id="emailOption" onclick="selectMethod('email')">
                    <span class="label">Email</span>
                    <div class="check-icon">✓</div>
                </div>
            </div>

            <div class="buttons-row">
                <button type="button" class="btn btn-primary" id="nextBtn" onclick="handleNext()">Next</button>
                <button type="button" class="btn btn-secondary" onclick="window.location.href='login.html'">Cancel</button>
            </div>

            <div class="message" id="message"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://ddrhpjiaotwtblnlqytw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkcmhwamlhb3R3dGJsbmxxeXR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NTI0MjMsImV4cCI6MjA4ODMyODQyM30.GNb6OTErsgNbb0PlEysXD7BtUhkjk0ldQCPbO_5EsKU';

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Rotating images
        const images = document.querySelectorAll('.image-container img');
        let currentImage = 0;
        if (images.length > 0) {
            setInterval(() => {
                images[currentImage].classList.remove('active');
                currentImage = (currentImage + 1) % images.length;
                images[currentImage].classList.add('active');
            }, 3000);
        }

        let selectedMethod = 'email'; // default to email (Supabase supported)

        function selectMethod(method) {
            selectedMethod = method;
            const sms = document.getElementById('smsOption');
            const email = document.getElementById('emailOption');

            if (method === 'sms') {
                sms.classList.add('active');
                email.classList.remove('active');
            } else {
                email.classList.add('active');
                sms.classList.remove('active');
            }
        }

        function showMessage(text, type) {
            const msgEl = document.getElementById('message');
            msgEl.textContent = text;
            msgEl.className = 'message ' + type;
            if (type !== 'success') {
                setTimeout(() => {
                    msgEl.className = 'message';
                }, 5000);
            }
        }

        function setLoading(isLoading) {
            const btn = document.getElementById('nextBtn');
            if (isLoading) {
                btn.disabled = true;
                btn.innerHTML = 'Sending... <span class="spinner"></span>';
            } else {
                btn.disabled = false;
                btn.innerHTML = 'Next';
            }
        }

        // Load profile image from stored user data
        function loadProfileImage() {
            const img = document.getElementById('profileImg');
            const placeholder = document.getElementById('profilePlaceholder');
            let avatarUrl =
                localStorage.getItem('userAvatarUrl') ||
                localStorage.getItem('verifiedUserAvatar') ||
                localStorage.getItem('pendingAvatarUrl');

            if (avatarUrl && avatarUrl !== 'null' && avatarUrl !== '') {
                img.src = avatarUrl;
                img.style.display = 'block';
                placeholder.style.display = 'none';
            } else {
                img.style.display = 'none';
                placeholder.style.display = 'flex';
            }
        }

        // OFFICIAL SUPABASE PASSWORD RESET
      async function handleNext() {
  setLoading(true);

  try {
    let email = localStorage.getItem('userEmail') || prompt('Enter your account email:');
    if (!email) {
      showMessage('Email is required.', 'error');
      setLoading(false);
      return;
    }

    console.log('Sending reset to:', email); // DEBUG

    const { data, error } = await supabaseClient.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/createpassword.html'
    });

    console.log('Supabase response:', data, error); // DEBUG

    if (error) {
      console.error('Reset error:', error);
      showMessage(error.message || 'Could not send reset email.', 'error');
      setLoading(false);
      return;
    }

    localStorage.setItem('passwordResetEmail', email);
    showMessage('Check your email (including spam) for reset link.', 'success');
    
  } catch (err) {
    console.error('Full error:', err);
    showMessage('Something went wrong.', 'error');
  } finally {
    setLoading(false);
  }
}

        // Initialize
        window.addEventListener('load', () => {
            loadProfileImage();
        });
    </script>
</body>
</html>
