<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Orders - HIM.CLOTHIERS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --brand-color: #6F4D38;
            --brand-hover: #5a3f2e;
            --brand-light: rgba(111, 77, 56, 0.1);
            --brand-lighter: rgba(111, 77, 56, 0.05);
            --bg-white: #ffffff;
            --bg-cream: #faf8f6;
            --text-primary: #1a1a1a;
            --text-secondary: #6c757d;
            --text-muted: #adb5bd;
            --border-color: #e9ecef;
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
            --info: #17a2b8;
            --radius: 16px;
            --radius-sm: 12px;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, var(--bg-cream) 0%, var(--bg-white) 100%);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }
        
        /* Animated Background */
        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            opacity: 0.4;
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(111, 77, 56, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(111, 77, 56, 0.03) 0%, transparent 50%);
            z-index: 0;
        }
        
        /* Navbar - Glassmorphism */
        .navbar {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(233, 236, 239, 0.5);
            z-index: 100;
            transition: var(--transition);
        }
        
        .navbar.scrolled {
            box-shadow: var(--shadow-sm);
        }
        
        .nav-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .logo {
            font-size: 20px;
            font-weight: 700;
            color: var(--brand-color);
            text-decoration: none;
            letter-spacing: -0.5px;
            transition: var(--transition);
        }
        
        .logo:hover {
            transform: scale(1.02);
        }
        
        .nav-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .nav-icon {
            position: relative;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            text-decoration: none;
            border-radius: 50%;
            transition: var(--transition);
            background: transparent;
        }
        
        .nav-icon:hover {
            background: var(--brand-light);
            transform: translateY(-2px);
        }
        
        .nav-icon:active {
            transform: scale(0.95);
        }
        
        .nav-icon i {
            font-size: 20px;
            transition: var(--transition);
        }
        
        .nav-icon:hover i {
            color: var(--brand-color);
        }
        
        .badge {
            position: absolute;
            top: 2px;
            right: 2px;
            background: var(--brand-color);
            color: white;
            font-size: 10px;
            font-weight: 700;
            min-width: 18px;
            height: 18px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
            box-shadow: 0 2px 4px rgba(111, 77, 56, 0.3);
            animation: badgePop 0.3s ease;
        }
        
        @keyframes badgePop {
            0% { transform: scale(0); }
            80% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        
        /* Main Layout - Split Screen */
        .main-container {
            display: flex;
            flex: 1;
            height: calc(100vh - 65px);
            overflow: hidden;
            position: relative;
            z-index: 1;
        }
        
        /* Left Container - 30% */
        .left-container {
            width: 30%;
            background: rgba(250, 248, 246, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
            position: relative;
            border-right: 1px solid rgba(233, 236, 239, 0.5);
        }
        
        .back-icon {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--brand-color);
            text-decoration: none;
            border-radius: 50%;
            transition: var(--transition);
            cursor: pointer;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(111, 77, 56, 0.1);
        }
        
        .back-icon:hover {
            background: var(--brand-light);
            transform: translateX(-4px);
        }
        
        .back-icon:active {
            transform: scale(0.95);
        }
        
        .back-icon i {
            font-size: 20px;
        }
        
        .profile-icon-space {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--brand-color) 0%, var(--brand-hover) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 60px;
            box-shadow: 0 8px 30px rgba(111, 77, 56, 0.3);
            overflow: hidden;
            border: 4px solid white;
            position: relative;
            transition: var(--transition);
        }
        
        .profile-icon-space::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.2) 100%);
            pointer-events: none;
        }
        
        .profile-icon-space:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 40px rgba(111, 77, 56, 0.4);
        }
        
        .profile-icon-space img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }
        
        .profile-icon-space:hover img {
            transform: scale(1.1);
        }
        
        .profile-icon-space i {
            font-size: 40px;
            color: white;
        }
        
        .user-info {
            margin-top: 20px;
            text-align: center;
        }
        
        .user-name {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }
        
        .user-email {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 6px;
            font-weight: 500;
        }
        
        .user-stats {
            display: flex;
            gap: 24px;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--border-color);
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--brand-color);
        }
        
        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }
        
        /* Right Container - 70% */
        .right-container {
            width: 70%;
            background: transparent;
            overflow-y: auto;
            padding: 24px;
            scroll-behavior: smooth;
        }
        
        .right-container::-webkit-scrollbar {
            width: 6px;
        }
        
        .right-container::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .right-container::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }
        
        .right-container::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
        
        .right-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .right-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -0.5px;
        }
        
        .right-title i {
            color: var(--brand-color);
            font-size: 24px;
        }
        
        .orders-count {
            font-size: 14px;
            color: var(--text-secondary);
            background: var(--brand-lighter);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            border: 1px solid rgba(111, 77, 56, 0.1);
        }
        
        /* Filter Tabs */
        .filter-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            overflow-x: auto;
            padding-bottom: 4px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        
        .filter-tabs::-webkit-scrollbar { display: none; }
        
        .filter-tab {
            padding: 10px 20px;
            border-radius: 25px;
            border: 1px solid var(--border-color);
            background: var(--bg-white);
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .filter-tab:hover {
            border-color: var(--brand-color);
            color: var(--brand-color);
            transform: translateY(-1px);
        }
        
        .filter-tab.active {
            background: var(--brand-color);
            color: white;
            border-color: var(--brand-color);
            box-shadow: 0 4px 15px rgba(111, 77, 56, 0.3);
        }
        
        .filter-tab .count {
            background: rgba(255,255,255,0.2);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
        }
        
        /* Skeleton Loading */
        .skeleton-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .skeleton-card {
            background: var(--bg-white);
            border-radius: var(--radius);
            padding: 24px;
            border: 1px solid var(--border-color);
            animation: shimmer 2s infinite;
            background: linear-gradient(90deg, var(--bg-white) 25%, #f0f0f0 50%, var(--bg-white) 75%);
            background-size: 200% 100%;
        }
        
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        .skeleton-line {
            height: 12px;
            background: var(--border-color);
            border-radius: 6px;
            margin-bottom: 12px;
        }
        
        .skeleton-line.short { width: 40%; }
        .skeleton-line.medium { width: 60%; }
        .skeleton-line.shorter { width: 30%; }
        
        /* Order Card - Glassmorphism */
        .order-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .order-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: var(--radius);
            padding: 24px;
            position: relative;
            border: 1px solid rgba(233, 236, 239, 0.8);
            border-left: 4px solid var(--brand-color);
            transition: var(--transition);
            animation: slideUp 0.5s ease backwards;
            cursor: pointer;
            overflow: hidden;
        }
        
        .order-card:nth-child(1) { animation-delay: 0.05s; }
        .order-card:nth-child(2) { animation-delay: 0.1s; }
        .order-card:nth-child(3) { animation-delay: 0.15s; }
        .order-card:nth-child(4) { animation-delay: 0.2s; }
        .order-card:nth-child(5) { animation-delay: 0.25s; }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        .order-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.4) 100%);
            pointer-events: none;
        }
        
        .order-card:hover {
            transform: translateY(-4px) scale(1.01);
            box-shadow: var(--shadow-lg);
            border-color: rgba(111, 77, 56, 0.2);
        }
        
        .order-card:active {
            transform: scale(0.99);
        }
        
        /* Status-specific card styles */
        .order-card.status-delivered {
            border-left-color: var(--success);
            background: linear-gradient(135deg, rgba(40, 167, 69, 0.02) 0%, rgba(255,255,255,0.95) 100%);
        }
        
        .order-card.status-rejected {
            border-left-color: var(--danger);
            background: linear-gradient(135deg, rgba(220, 53, 69, 0.02) 0%, rgba(255,255,255,0.95) 100%);
        }
        
        .order-card.status-shipping,
        .order-card.status-transferring {
            border-left-color: var(--info);
            background: linear-gradient(135deg, rgba(23, 162, 184, 0.02) 0%, rgba(255,255,255,0.95) 100%);
        }
        
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        
        .order-id {
            font-size: 16px;
            font-weight: 700;
            color: var(--brand-color);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .order-id i {
            font-size: 12px;
            opacity: 0.7;
        }
        
        .order-date {
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .order-status {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        
        .status-badge i {
            font-size: 12px;
        }
        
        /* Status Colors */
        .status-pending { background: rgba(255, 193, 7, 0.15); color: #856404; }
        .status-submitted { background: rgba(23, 162, 184, 0.15); color: #0c5460; }
        .status-paid { background: rgba(40, 167, 69, 0.15); color: #155724; }
        .status-packaging { background: rgba(255, 193, 7, 0.2); color: #856404; }
        .status-shipping { background: rgba(23, 162, 184, 0.2); color: #0c5460; }
        .status-transferring { background: rgba(111, 77, 56, 0.15); color: var(--brand-color); }
        .status-delivered { background: rgba(40, 167, 69, 0.2); color: var(--success); }
        .status-rejected { background: rgba(220, 53, 69, 0.15); color: var(--danger); }
        
        .status-time {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--success);
            font-weight: 700;
            background: rgba(40, 167, 69, 0.1);
            padding: 4px 10px;
            border-radius: 12px;
            margin-top: 4px;
        }
        
        .live-indicator::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse-dot 2s infinite;
        }
        
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.3); }
        }
        
        /* Progress Tracker */
        .progress-tracker {
            margin: 20px 0;
            padding: 20px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: var(--radius-sm);
            border: 1px solid rgba(233, 236, 239, 0.8);
        }
        
        .progress-steps {
            display: flex;
            justify-content: space-between;
            position: relative;
        }
        
        .progress-steps::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 10%;
            right: 10%;
            height: 3px;
            background: var(--border-color);
            z-index: 0;
            border-radius: 2px;
        }
        
        .progress-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            position: relative;
            z-index: 1;
            flex: 1;
        }
        
        .step-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--bg-white);
            border: 3px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: var(--transition);
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        
        .progress-step.active .step-icon {
            background: var(--brand-color);
            border-color: var(--brand-color);
            color: white;
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(111, 77, 56, 0.3);
        }
        
        .progress-step.completed .step-icon {
            background: var(--success);
            border-color: var(--success);
            color: white;
        }
        
        .step-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-align: center;
            max-width: 70px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .progress-step.active .step-label {
            color: var(--brand-color);
        }
        
        .progress-step.completed .step-label {
            color: var(--success);
        }
        
        /* Order Items */
        .order-items {
            margin-bottom: 20px;
        }
        
        .item-row {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(0,0,0,0.03);
            transition: var(--transition);
        }
        
        .item-row:hover {
            background: rgba(111, 77, 56, 0.02);
            margin: 0 -12px;
            padding-left: 12px;
            padding-right: 12px;
            border-radius: 8px;
        }
        
        .item-row:last-child {
            border-bottom: none;
        }
        
        .item-image {
            width: 60px;
            height: 60px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            border: 1px solid var(--border-color);
            flex-shrink: 0;
            transition: var(--transition);
        }
        
        .item-row:hover .item-image {
            transform: scale(1.05);
        }
        
        .item-details {
            flex: 1;
            min-width: 0;
        }
        
        .item-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }
        
        .item-meta {
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .item-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .item-price {
            font-size: 15px;
            font-weight: 700;
            color: var(--brand-color);
            flex-shrink: 0;
        }
        
        .more-items {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 12px;
            padding: 8px 12px;
            background: var(--brand-lighter);
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
        }
        
        /* Order Footer */
        .order-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 20px;
            border-top: 2px solid rgba(0,0,0,0.03);
        }
        
        .order-total {
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        .order-total strong {
            font-size: 22px;
            color: var(--text-primary);
            margin-left: 8px;
            font-weight: 700;
        }
        
        .view-details-btn {
            padding: 10px 10px;
            background: var(--brand-color);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(111, 77, 56, 0.2);
            transform: scale(0.75);
        }
        
        .view-details-btn:hover {
            background: var(--brand-hover);
            box-shadow: 0 6px 20px rgba(111, 77, 56, 0.3);
        }
        
        .view-details-btn:active {
            transform: translateY(0);
        }
        
        .view-details-btn i {
            font-size: 14px;
            transition: var(--transition);
        }
        
        .view-details-btn:hover i {
            transform: translateX(2px);
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-secondary);
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border-color);
            border-top-color: var(--brand-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }

        // Load user profile
       // Load user profile data including image from Supabase AND localStorage
async function loadUserProfile() {
    try {
        // Update email display
        document.getElementById('userEmail').textContent = userEmail;
        
        // First check localStorage for cached profile data (like courses page does)
        const cachedProfileImage = localStorage.getItem('userProfileImage');
        const cachedUserName = localStorage.getItem('userName');
        const cachedUserData = localStorage.getItem('userData');
        
        // Update name from localStorage first (fast)
        if (cachedUserName) {
            document.getElementById('userName').textContent = cachedUserName;
        }
        
        // If we have cached userData from courses page, parse and use it
        if (cachedUserData) {
            try {
                const parsedData = JSON.parse(cachedUserData);
                if (parsedData.profile_image || parsedData.avatar_url || parsedData.image_url || parsedData.photo_url) {
                    const img = parsedData.profile_image || parsedData.avatar_url || parsedData.image_url || parsedData.photo_url;
                    document.getElementById('profileIconSpace').innerHTML = `<img src="${img}" alt="Profile" onerror="showDefaultIcon()">`;
                }
                if (parsedData.name) {
                    document.getElementById('userName').textContent = parsedData.name;
                }
            } catch (e) {
                console.log('Error parsing cached user data');
            }
        }
        
        // Also check for direct cached image
        const profileIconSpace = document.getElementById('profileIconSpace');
        if (cachedProfileImage && !profileIconSpace.querySelector('img')) {
            profileIconSpace.innerHTML = `<img src="${cachedProfileImage}" alt="Profile" onerror="showDefaultIcon()">`;
        }
        
        // Then try to fetch fresh data from Supabase - check multiple possible table names
        let userData = null;
        
        // Try 'profiles' table first (common in Supabase)
        try {
            const { data, error } = await supabaseClient
                .from('profiles')
                .select('*')
                .eq('email', userEmail)
                .maybeSingle();
            
            if (!error && data) {
                userData = data;
                console.log('Found user in profiles table');
            }
        } catch (e) {
            console.log('profiles table not found');
        }
        
        // If not found, try 'users' table
        if (!userData) {
            try {
                const { data, error } = await supabaseClient
                    .from('users')
                    .select('*')
                    .eq('email', userEmail)
                    .maybeSingle();
                
                if (!error && data) {
                    userData = data;
                    console.log('Found user in users table');
                }
            } catch (e) {
                console.log('users table not found');
            }
        }
        
        // If still not found, try auth user metadata
        if (!userData) {
            try {
                const { data: { user } } = await supabaseClient.auth.getUser();
                if (user && user.user_metadata) {
                    userData = user.user_metadata;
                    console.log('Found user in auth metadata');
                }
            } catch (e) {
                console.log('Could not get auth user');
            }
        }
        
        // Update UI with fetched data
        if (userData) {
            // Update name
            const displayName = userData.name || 
                               userData.full_name || 
                               userData.username || 
                               cachedUserName || 
                               'My Account';
            document.getElementById('userName').textContent = displayName;
            
            // Save to localStorage for cache
            localStorage.setItem('userName', displayName);
            localStorage.setItem('userData', JSON.stringify(userData));
            
            // Check for profile image in any possible field
            const profileImage = userData.profile_image || 
                                userData.avatar_url || 
                                userData.image_url || 
                                userData.photo_url ||
                                userData.avatar ||
                                userData.picture ||
                                userData.image;
            
            // Update profile image if found
            if (profileImage) {
                profileIconSpace.innerHTML = `<img src="${profileImage}" alt="Profile" onerror="showDefaultIcon()">`;
                // Cache in localStorage
                localStorage.setItem('userProfileImage', profileImage);
            }
        } else {
            console.log('No user data found in any source, using localStorage fallback');
            // If no Supabase data at all, ensure we have localStorage fallback
            if (!cachedUserName) {
                document.getElementById('userName').textContent = 'My Account';
            }
        }
        
    } catch (error) {
        console.error('Error in loadUserProfile:', error);
        // Final fallback
        const fallbackName = localStorage.getItem('userName') || 'My Account';
        document.getElementById('userName').textContent = fallbackName;
        
        // Try to use cached image as last resort
        const cachedImage = localStorage.getItem('userProfileImage');
        if (cachedImage) {
            document.getElementById('profileIconSpace').innerHTML = `<img src="${cachedImage}" alt="Profile" onerror="showDefaultIcon()">`;
        }
    }
}

        // Setup realtime subscriptions
       function setupRealtimeSubscriptions() {
    // Get email inside the function to ensure it's available
    const userEmail = localStorage.getItem('userEmail') || localStorage.getItem('adminEmail');
    
    if (!userEmail) {
        console.log('No user email found for realtime subscription');
        return;
    }
    
    console.log('Setting up realtime subscription for:', userEmail);
    
    ordersSubscription = supabaseClient
        .channel('user-orders-channel')
        .on('postgres_changes', {
            event: 'UPDATE',
            schema: 'public',
            table: 'orders',
            filter: `customer_email=eq.${userEmail}`
        }, (payload) => {
            console.log('Order updated via realtime:', payload);
            
            const updatedOrder = payload.new;
            const oldOrder = orders.find(o => o.id === updatedOrder.id);
            
            if (oldOrder && oldOrder.inventory_status !== updatedOrder.inventory_status) {
                showStatusUpdateToast(updatedOrder);
                
                // Haptic feedback
                if (navigator.vibrate) {
                    navigator.vibrate([50, 100, 50]);
                }
            }
            
            // Reload orders to show updated data
            loadOrders();
        })
        .subscribe((status) => {
            console.log('Realtime subscription status:', status);
        });
}

                    title: 'Order Delivered', 
                    message: 'Your order has been delivered. Enjoy!', 
                    icon: 'fa-check-circle',
                    type: 'success'
                }
            };
            
            const statusInfo = statusMessages[order.inventory_status];
            if (statusInfo) {
                showToast(statusInfo.title, statusInfo.message, statusInfo.type, statusInfo.icon);
            }
        }
        
        function showToast(title, message, type = 'info', iconClass = 'fa-info-circle') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            toast.innerHTML = `
                <div class="toast-icon"><i class="fa-solid ${iconClass}"></i></div>
                <div class="toast-content">
                    <div class="toast-title">${title}</div>
                    <div class="toast-message">${message}</div>
                </div>
            `;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'toastSlide 0.4s ease reverse';
                setTimeout(() => toast.remove(), 400);
            }, 5000);
        }
        
        // Load orders
        async function loadOrders() {
            try {
                const { data, error } = await supabaseClient
                    .from('orders')
                    .select('*')
                    .eq('customer_email', userEmail)
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                
                orders = data || [];
                updateStats();
                applyFilter();
                
            } catch (error) {
                console.error('Error loading orders:', error);
                showEmptyState();
            }
        }
        
        function updateStats() {
            const total = orders.length;
            const active = orders.filter(o => {
                const status = o.inventory_status || o.status;
                return ['packaging', 'shipping', 'transferring'].includes(status);
            }).length;
            const delivered = orders.filter(o => {
                const status = o.inventory_status || o.status;
                return status === 'delivered';
            }).length;
            
            // Animate numbers
            animateNumber('totalOrders', total);
            animateNumber('activeOrders', active);
            animateNumber('deliveredOrders', delivered);
            
            document.getElementById('countAll').textContent = total;
            document.getElementById('countActive').textContent = active;
        }
        
        function animateNumber(id, target) {
            const element = document.getElementById(id);
            const start = parseInt(element.textContent) || 0;
            const duration = 600;
            const startTime = performance.now();
            
            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const easeProgress = 1 - Math.pow(1 - progress, 3);
                const current = Math.floor(start + (target - start) * easeProgress);
                
                element.textContent = current;
                
                if (progress < 1) {
                    requestAnimationFrame(update);
                }
            }
            
            requestAnimationFrame(update);
        }
        
        function filterOrders(type) {
            currentFilter = type;
            
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.closest('.filter-tab').classList.add('active');
            
            applyFilter();
        }
        
        function applyFilter() {
            switch(currentFilter) {
                case 'active':
                    filteredOrders = orders.filter(o => {
                        const status = o.inventory_status || o.status;
                        return ['packaging', 'shipping', 'transferring'].includes(status);
                    });
                    break;
                case 'delivered':
                    filteredOrders = orders.filter(o => {
                        const status = o.inventory_status || o.status;
                        return status === 'delivered';
                    });
                    break;
                case 'cancelled':
                    filteredOrders = orders.filter(o => {
                        const status = o.inventory_status || o.status;
                        return status === 'rejected';
                    });
                    break;
                default:
                    filteredOrders = orders;
            }
            
            document.getElementById('ordersCount').textContent = 
                `${filteredOrders.length} order${filteredOrders.length !== 1 ? 's' : ''}`;
            
            renderOrders();
        }
        
        function renderOrders() {
            const container = document.getElementById('ordersContainer');
            
            if (filteredOrders.length === 0) {
                showEmptyState();
                return;
            }
            
            container.innerHTML = `<div class="order-list">${filteredOrders.map((order, index) => createOrderCard(order, index)).join('')}</div>`;
        }
        
        function createOrderCard(order, index) {
            const orderDate = new Date(order.created_at).toLocaleDateString('en-NG', {
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });
            
            let displayStatus = order.inventory_status || order.status;
            if (order.status === 'paid' && !order.inventory_status) {
                displayStatus = 'packaging';
            }
            
            const statusClass = getStatusClass(displayStatus);
            const statusText = getStatusText(displayStatus);
            const statusIcon = getStatusIcon(displayStatus);
            
            const firstItem = order.items && order.items[0];
            const itemCount = order.items ? order.items.length : 0;
            
            let statusTime = '';
            if (order.inventory_updated_at) {
                statusTime = new Date(order.inventory_updated_at).toLocaleString('en-NG', {
                    month: 'short',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            }
            
            let progressHtml = '';
            if (['packaging', 'shipping', 'transferring', 'delivered'].includes(displayStatus)) {
                progressHtml = createProgressTracker(displayStatus);
            }
            
            const cardClass = `status-${displayStatus}`;
            
            return `
                <div class="order-card ${cardClass}" data-order-id="${order.id}" onclick="viewOrderDetails('${order.id}')" style="animation-delay: ${index * 0.05}s">
                    <div class="order-header">
                        <div>
                            <div class="order-id">
                                <i class="fa-solid fa-hashtag"></i>
                                Order #${order.id.slice(-8).toUpperCase()}
                            </div>
                            <div class="order-date">
                                <i class="fa-regular fa-calendar"></i>
                                ${orderDate}
                            </div>
                        </div>
                        <div class="order-status">
                            <span class="status-badge ${statusClass}">
                                <i class="fa-solid ${statusIcon}"></i>
                                ${statusText}
                            </span>
                            ${statusTime ? `
                                <span class="status-time">
                                    <i class="fa-regular fa-clock"></i>
                                    ${statusTime}
                                </span>
                            ` : ''}
                            ${['packaging', 'shipping', 'transferring'].includes(displayStatus) ? 
                                '<span class="live-indicator">Live updates</span>' : ''}
                        </div>
                    </div>
                    
                    ${progressHtml}
                    
                    <div class="order-items">
                        ${firstItem ? `
                        <div class="item-row">
                            <img src="${firstItem.image || 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2260%22 height=%2260%22><rect fill=%22%23f9f5f2%22 width=%2260%22 height=%2260%22/><text fill=%22%236F4D38%22 x=%2230%22 y=%2238%22 font-size=%2224%22 text-anchor=%22middle%22>👕</text></svg>'}" 
                                 alt="${firstItem.name}" 
                                 class="item-image"
                                 onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2260%22 height=%2260%22><rect fill=%22%23f9f5f2%22 width=%2260%22 height=%2260%22/><text fill=%22%236F4D38%22 x=%2230%22 y=%2238%22 font-size=%2224%22 text-anchor=%22middle%22>👕</text></svg>'">
                            <div class="item-details">
                                <div class="item-name">${firstItem.name}</div>
                                <div class="item-meta">
                                    <span><i class="fa-solid fa-layer-group"></i> Qty: ${firstItem.quantity}</span>
                                    ${firstItem.size ? `<span><i class="fa-solid fa-ruler"></i> ${firstItem.size}</span>` : ''}
                                    ${firstItem.color ? `<span><i class="fa-solid fa-palette"></i> ${firstItem.color}</span>` : ''}
                                </div>
                            </div>
                            <div class="item-price">₦${(parseFloat(firstItem.price) * firstItem.quantity).toLocaleString()}</div>
                        </div>
                        ${itemCount > 1 ? `
                            <div class="more-items">
                                <i class="fa-solid fa-plus"></i>
                                ${itemCount - 1} more item${itemCount > 2 ? 's' : ''}
                            </div>
                        ` : ''}
                        ` : '<div style="color: var(--text-secondary);"><i class="fa-solid fa-circle-info" style="margin-right: 6px;"></i>No items</div>'}
                    </div>
                    
                    <div class="order-footer">
                        <div class="order-total">
                            Total<strong>₦${parseFloat(order.total_amount).toLocaleString()}</strong>
                        </div>
                        <button class="view-details-btn" onclick="event.stopPropagation(); viewOrderDetails('${order.id}')">
                            Details
                            <i class="fa-solid fa-arrow-right"></i>
                        </button>
                    </div>
                </div>
            `;
        }
        
        function createProgressTracker(currentStatus) {
            const steps = [
                { key: 'packaging', label: 'Packaging', icon: 'fa-box' },
                { key: 'shipping', label: 'Shipping', icon: 'fa-truck' },
                { key: 'transferring', label: 'Transfer', icon: 'fa-exchange-alt' },
                { key: 'delivered', label: 'Delivered', icon: 'fa-check' }
            ];
            
            const currentIndex = steps.findIndex(s => s.key === currentStatus);
            
            return `
                <div class="progress-tracker">
                    <div class="progress-steps">
                        ${steps.map((step, index) => {
                            let state = '';
                            if (currentStatus === 'delivered') {
                                state = 'completed';
                            } else {
                                if (index < currentIndex) state = 'completed';
                                else if (index === currentIndex) state = 'active';
                            }
                            
                            return `
                                <div class="progress-step ${state}">
                                    <div class="step-icon"><i class="fa-solid ${step.icon}"></i></div>
                                    <div class="step-label">${step.label}</div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        }
        
        function getStatusClass(status) {
            const statusMap = {
                'pending': 'status-pending',
                'submitted': 'status-submitted',
                'paid': 'status-paid',
                'packaging': 'status-packaging',
                'shipping': 'status-shipping',
                'transferring': 'status-transferring',
                'delivered': 'status-delivered',
                'rejected': 'status-rejected'
            };
            return statusMap[status] || 'status-pending';
        }
        
        function getStatusText(status) {
            const statusMap = {
                'pending': 'Pending Payment',
                'submitted': 'Payment Submitted',
                'paid': 'Payment Confirmed',
                'packaging': 'Being Packaged',
                'shipping': 'In Transit',
                'transferring': 'Transferring',
                'delivered': 'Delivered',
                'rejected': 'Cancelled'
            };
            return statusMap[status] || status;
        }
        
        function getStatusIcon(status) {
            const iconMap = {
                'pending': 'fa-clock',
                'submitted': 'fa-paper-plane',
                'paid': 'fa-check-circle',
                'packaging': 'fa-box',
                'shipping': 'fa-truck-fast',
                'transferring': 'fa-exchange-alt',
                'delivered': 'fa-check-double',
                'rejected': 'fa-times-circle'
            };
            return iconMap[status] || 'fa-circle';
        }
        
        function showEmptyState() {
            const container = document.getElementById('ordersContainer');
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-illustration"></div>
                    <h3>${currentFilter === 'all' ? 'No orders yet' : 'No orders found'}</h3>
                    <p>${currentFilter === 'all' ? 'Your order history will appear here once you make a purchase.' : 'Try adjusting your filters to see more orders.'}</p>
                    ${currentFilter === 'all' ? '<button class="empty-action" onclick="window.location.href=\'shop.html\'">Start Shopping</button>' : ''}
                </div>
            `;
        }
        
        function viewOrderDetails(orderId) {
            const order = orders.find(o => o.id === orderId);
            if (!order) return;
            
            const orderDate = new Date(order.created_at).toLocaleDateString('en-NG', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
            
            const displayStatus = order.inventory_status || order.status;
            
            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = `
                <div class="detail-section">
                    <div class="detail-label">Order ID</div>
                    <div class="detail-value">#${order.id}</div>
                </div>
                
                <div class="detail-section">
                    <div class="detail-label">Order Date</div>
                    <div class="detail-value">${orderDate}</div>
                </div>
                
                <div class="detail-section">
                    <div class="detail-label">Current Status</div>
                    <div class="detail-value">
                        <span class="status-badge ${getStatusClass(displayStatus)}">
                            <i class="fa-solid ${getStatusIcon(displayStatus)}"></i>
                            ${getStatusText(displayStatus)}
                        </span>
                    </div>
                </div>
                
                <div class="detail-section">
                    <div class="detail-label">Items</div>
                    ${order.items ? order.items.map(item => `
                        <div class="detail-row">
                            <div style="display: flex; align-items: center; gap: 12px;">
                                <img src="${item.image || 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2240%22 height=%2240%22><rect fill=%22%23f9f5f2%22 width=%2240%22 height=%2240%22/><text fill=%22%236F4D38%22 x=%2220%22 y=%2228%22 font-size=%2216%22 text-anchor=%22middle%22>👕</text></svg>'}" 
                                     style="width: 40px; height: 40px; border-radius: 8px; object-fit: cover;">
                                <div>
                                    <div style="font-weight: 600;">${item.name}</div>
                                    <div style="font-size: 13px; color: var(--text-secondary);">
                                        ₦${parseFloat(item.price).toLocaleString()} × ${item.quantity}
                                    </div>
                                </div>
                            </div>
                            <div style="font-weight: 700; color: var(--brand-color);">
                                ₦${(parseFloat(item.price) * item.quantity).toLocaleString()}
                            </div>
                        </div>
                    `).join('') : '<p>No items</p>'}
                </div>
                
                <div class="detail-section">
                    <div class="detail-label">Order Total</div>
                    <div class="detail-value" style="font-size: 28px; color: var(--brand-color);">
                        ₦${parseFloat(order.total_amount).toLocaleString()}
                    </div>
                </div>
            `;
            
            document.getElementById('orderModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        
        function closeModal() {
            document.getElementById('orderModal').classList.remove('active');
            document.body.style.overflow = '';
        }
        
        // Cleanup
        window.addEventListener('beforeunload', () => {
            if (ordersSubscription) {
                supabaseClient.removeChannel(ordersSubscription);
            }
        });
    </script>
</body>
</html>
