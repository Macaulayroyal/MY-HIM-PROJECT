<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create New Password - HIM.clothiers</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Lexend', sans-serif;
    scrollbar-width: none;
    -webkit-tap-highlight-color: transparent;
}

*::-webkit-scrollbar {
    display: none;
}

html, body {
    height: 100%;
    width: 100%;
}

body {
    background: white;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    overflow-x: hidden;
}

.container {
    display: flex;
    background: white;
    overflow: hidden;
    max-width: 1200px;
    width: 100%;
    min-height: 600px;
    height: 100vh;
    height: 100dvh;
}

.image-container {
    flex: 1;
    position: relative;
    overflow: hidden;
    min-height: 400px;
}

.image-container img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 1s ease-in-out;
}

.image-container img.active {
    opacity: 1;
}

.content-container {
    flex: 1;
    padding: 60px 50px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    width: 100%;
}

.page-title {
    font-size: 1.9rem; /* reduced slightly for mobile */
    font-weight: 700;
    color: #000;
    margin-bottom: 12px;
    letter-spacing: 1px;
}

.description {
    font-size: 1rem;
    font-weight: 300;
    color: #000;
    margin-bottom: 40px;
}

.form-wrapper {
    width: 100%;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.input-field {
    width: 100%;
    padding: 18px 24px;
    border: 2px solid #e0e0e0;
    border-radius: 200px;
    font-size: 1rem;
    font-weight: 300;
    color: #333;
    transition: all 0.3s ease;
    background: white;
}

.input-field:focus {
    outline: none;
    border-color: #6F4D38;
    box-shadow: 0 0 0 3px rgba(111, 77, 56, 0.1);
}

.input-field::placeholder {
    color: #999;
}

.btn {
    width: 100%;
    padding: 18px 24px;
    font-size: 1rem;
    font-weight: 500;
    border-radius: 200px;
    cursor: pointer;
    transition: all 0.3s ease;
    border: none;
    text-align: center;
    flex-shrink: 0;
}

.btn-primary {
    background-color: #6F4D38;
    color: white;
    box-shadow: 0 4px 15px rgba(111, 77, 56, 0.3);
}

.btn-primary:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(111, 77, 56, 0.4);
    background-color: #5a3f2d;
}

.btn-primary:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

.btn-secondary {
    background-color: white;
    color: #000;
    border: 2px solid #e0e0e0;
}

.btn-secondary:hover {
    background-color: #f5f5f5;
    border-color: #ccc;
    transform: translateY(-2px);
}

.spinner {
    display: inline-block;
    width: 18px;
    height: 18px;
    border: 2px solid #ffffff;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-left: 10px;
    vertical-align: middle;
}

@keyframes spin {
    to {
        transform: rotate(360deg);
    }
}

.message {
    margin-top: 20px;
    padding: 14px 20px;
    border-radius: 12px;
    font-size: 0.95rem;
    display: none;
    max-width: 380px;
    width: 100%;
    font-weight: 400;
    text-align: center;
}

.message.error {
    background-color: #fee;
    color: #c33;
    display: block;
}

.message.success {
    background-color: #efe;
    color: #3c3;
    display: block;
}

/* Desktop */
@media (min-width: 769px) {
    body {
        padding: 20px;
    }

    .btn {
        width: 100% !important;
        max-width: 380px !important;
    }
}

/* Mobile */
@media (max-width: 768px) {
    .container {
        flex-direction: column;
    }

    .image-container {
        display: none;
    }

    .content-container {
        padding: 80px 24px;
        min-height: 100vh;
        min-height: 100dvh;
        justify-content: center;
        text-align: center;
    }

    .page-title {
        font-size: 1.75rem; /* smaller for mobile */
        margin-bottom: 12px;
    }

    .description {
        font-size: 0.95rem;
        margin-bottom: 32px;
    }

    .input-field, .btn {
        font-size: 1rem;
        padding: 18px 20px;
    }

    .message {
        font-size: 0.9rem;
        padding: 14px 20px;
        margin-top: 24px;
    }
}

/* Small mobile */
@media (max-width: 380px) {
    .content-container {
        padding: 60px 16px;
    }

    .page-title {
        font-size: 1.6rem; /* slightly reduced */
    }

    .input-field, .btn {
        padding: 16px 18px;
    }

    .message {
        font-size: 0.85rem;
        padding: 12px 16px;
    }
}

/* Extra small mobile */
@media (max-width: 320px) {
    .content-container {
        padding: 50px 12px;
    }

    .page-title {
        font-size: 1.5rem; /* smaller header fits tiny screens */
    }

    .input-field, .btn {
        padding: 14px 16px;
        font-size: 0.95rem;
    }

    .message {
        font-size: 0.8rem;
        padding: 10px 12px;
    }
}

/* Landscape mobile */
@media (max-width: 768px) and (orientation: landscape) {
    .content-container {
        padding: 40px 32px;
        gap: 24px;
    }

    .page-title {
        font-size: 1.65rem;
    }

    .input-field, .btn {
        padding: 16px 20px;
    }
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.content-container > * {
    animation: fadeIn 0.6s ease-out forwards;
}


</style>

</head>
<body>
  <div class="container">
    <div class="image-container">
      <img src="img/bg1.jpg" alt="Modern workspace" class="active">
      <img src="img/bg2.jpg" alt="Team collaboration">
      <img src="img/bg1.jpg" alt="Creative meeting">
      <img src="img/bg2.jpg" alt="Team collaboration">
    </div>

    <div class="content-container">
      <h1 class="page-title">Create New Password</h1>
      <p class="description">Enter a new password for your HIM.clothiers account.</p>

      <form class="form-wrapper" id="createPasswordForm">
        <input
          type="password"
          id="newPassword"
          class="input-field"
          placeholder="New password"
          required
          minlength="6"
        />
        <input
          type="password"
          id="confirmPassword"
          class="input-field"
          placeholder="Confirm new password"
          required
          minlength="6"
        />
<br>
        <button type="submit" class="btn btn-primary" id="createBtn">
          Save Password
        </button>
        <button
          type="button"
          class="btn btn-secondary"
          onclick="window.location.href='login.html'"
        >
          Cancel
        </button>
      </form>

      <div class="message" id="message"></div>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://ddrhpjiaotwtblnlqytw.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkcmhwamlhb3R3dGJsbmxxeXR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NTI0MjMsImV4cCI6MjA4ODMyODQyM30.GNb6OTErsgNbb0PlEysXD7BtUhkjk0ldQCPbO_5EsKU';

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Rotate images
    const images = document.querySelectorAll('.image-container img');
    let currentImage = 0;
    if (images.length > 0) {
        setInterval(() => {
            images[currentImage].classList.remove('active');
            currentImage = (currentImage + 1) % images.length;
            images[currentImage].classList.add('active');
        }, 3000);
    }

    function showMessage(text, type) {
        const msgEl = document.getElementById('message');
        msgEl.textContent = text;
        msgEl.className = 'message ' + type;
        if (type !== 'success') {
            setTimeout(() => {
                msgEl.className = 'message';
            }, 5000);
        }
    }

    function setLoading(isLoading) {
        const btn = document.getElementById('createBtn');
        if (isLoading) {
            btn.disabled = true;
            btn.innerHTML = 'Saving... <span class="spinner"></span>';
        } else {
            btn.disabled = false;
            btn.textContent = 'Save Password';
        }
    }

    // Check if user came from password reset link
    supabaseClient.auth.onAuthStateChange((event, session) => {
        console.log('Auth event:', event, session);
        if (event === 'PASSWORD_RECOVERY' && session) {
            console.log('Password recovery mode - ready to update password');
        } else if (!session) {
            showMessage('Invalid or expired reset link. Please request a new one.', 'error');
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 2000);
        }
    });

    // Check initial session on page load
    supabaseClient.auth.getSession().then(({ data: { session } }) => {
        if (!session) {
            showMessage('Please use the reset link from your email.', 'error');
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 2000);
        }
    });

    async function handleCreatePassword(e) {
        e.preventDefault();
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (!newPassword || newPassword.length < 6) {
            showMessage('Password must be at least 6 characters.', 'error');
            return;
        }
        if (newPassword !== confirmPassword) {
            showMessage('Passwords do not match.', 'error');
            return;
        }

        setLoading(true);

        try {
            // Update password
            const { data, error } = await supabaseClient.auth.updateUser({
                password: newPassword
            });

            if (error) {
                console.error('Update error:', error);
                showMessage('Error: ' + (error.message || 'Could not update password'), 'error');
                setLoading(false);
                return;
            }

            console.log('Password updated successfully');

            // Wait a moment for Supabase to sync, then auto-login
            showMessage('Password updated! Logging you in...', 'success');
            
            // Give Supabase time to sync the new password (3 seconds)
            setTimeout(async () => {
                try {
                    // Auto-login with new password
                    const { data: loginData, error: loginError } = await supabaseClient.auth.signInWithPassword({
                        email: session?.user?.email || localStorage.getItem('passwordResetEmail') || '',
                        password: newPassword
                    });

                    if (loginError) {
                        console.log('Auto-login failed, redirecting to manual login');
                        window.location.href = 'login.html';
                    } else {
                        // Login successful - go to dashboard/course page
                        localStorage.setItem('userEmail', loginData.user.email);
                        window.location.href = 'HIM-coursepage.html';
                    }
                } catch (loginErr) {
                    console.log('Auto-login failed, manual login required');
                    window.location.href = 'login.html';
                }
            }, 3000);

        } catch (err) {
            console.error('Full error:', err);
            showMessage('Something went wrong. Please try login with new password.', 'error');
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 2000);
        }
    }

    document
        .getElementById('createPasswordForm')
        .addEventListener('submit', handleCreatePassword);
</script>

</body>
</html>
