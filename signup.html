<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Lexend', sans-serif;
        scrollbar-width: none;
        -webkit-tap-highlight-color: transparent;
    }

    *::-webkit-scrollbar {
        display: none;
    }

    html {
        height: 100%;
        width: 100%;
    }

    body {
        background: white;
        min-height: 100vh;
        min-height: 100dvh;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        overflow-x: hidden;
    }

    .container {
        display: flex;
        background: white;
        overflow: hidden;
        max-width: 1200px;
        width: 100%;
        min-height: 600px;
        height: 100vh;
        height: 100dvh;
    }

    .image-container {
        flex: 1;
        position: relative;
        overflow: hidden;
        min-height: 400px;
    }

    .image-container img {
        position: absolute;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0;
        transition: opacity 1s ease-in-out;
    }

    .image-container img.active {
        opacity: 1;
    }

    .content-container {
        flex: 1;
        padding: 60px 50px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        width: 100%;
    }

    .header-section {
        width: 100%;
        max-width: 400px;
        text-align: left;
        margin-bottom: 50px;
    }

    .page-title {
        font-size: 2.5rem;
        font-weight: 700;
        color: #000;
        letter-spacing: 2px;
        margin-bottom: 50px;
    }

    .profile-upload {
        width: 60px;
        height: 60px;
        cursor: pointer;
        transition: transform 0.3s ease;
        display: inline-block;
        position: relative;
        flex-shrink: 0;
    }

    .profile-upload:hover {
        transform: scale(1.1);
    }

    .profile-upload img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 50%;
    }

    .profile-upload.has-image {
        border: 3px solid #6F4D38;
        border-radius: 50%;
    }

    .signup-form {
        width: 100%;
        max-width: 400px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        align-items: center;
    }

    .input-group {
        width: 100%;
        position: relative;
    }

    .input-field {
        width: 100%;
        padding: 16px 20px;
        border: 2px solid #e0e0e0;
        font-size: 1rem;
        font-weight: 300;
        color: #333;
        transition: all 0.3s ease;
        font-family: 'Lexend', sans-serif;
        border-radius: 200px;
        background: white;
    }

    .input-field:focus {
        outline: none;
        border-color: #6F4D38;
        box-shadow: 0 0 0 3px rgba(111, 77, 56, 0.1);
    }

    .input-field::placeholder {
        color: #999;
    }

    .phone-input-wrapper {
        display: flex;
        width: 100%;
        align-items: center;
        position: relative;
        border: 2px solid #e0e0e0;
        border-radius: 200px;
        transition: all 0.3s ease;
        background: white;
        overflow: hidden;
    }

    .phone-input-wrapper:focus-within {
        border-color: #6F4D38;
        box-shadow: 0 0 0 3px rgba(111, 77, 56, 0.1);
    }

    .country-select {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 16px 12px;
        background: white;
        cursor: pointer;
        min-width: 100px;
        transition: all 0.3s ease;
        border: none;
        border-radius: 0;
        flex-shrink: 0;
    }

    .country-select:hover {
        background-color: #f9f5f2;
    }

    .divider {
        width: 1px;
        height: 24px;
        background-color: #e0e0e0;
        transition: all 0.3s ease;
        flex-shrink: 0;
    }

    .phone-input-wrapper:focus-within .divider {
        background-color: #6F4D38;
    }

    .country-flag {
        width: 24px;
        height: 16px;
        object-fit: cover;
        border-radius: 2px;
    }

    .country-code {
        font-size: 0.9rem;
        color: #333;
        font-weight: 400;
        white-space: nowrap;
    }

    .dropdown-arrow {
        width: 12px;
        height: 12px;
        fill: #666;
        flex-shrink: 0;
    }

    .phone-input {
        flex: 1;
        border: none;
        border-radius: 0;
        background: transparent;
        padding: 16px 20px;
        font-size: 1rem;
        font-weight: 300;
        color: #333;
        font-family: 'Lexend', sans-serif;
        min-width: 0;
    }

    .phone-input:focus {
        outline: none;
        box-shadow: none;
    }

    .country-dropdown {
        position: absolute;
        top: 100%;
        left: 0;
        margin-top: 5px;
        background: white;
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        width: 200px;
        max-height: 200px;
        overflow-y: auto;
        display: none;
        z-index: 100;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .country-dropdown.active {
        display: block;
    }

    .country-option {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px;
        cursor: pointer;
        transition: background 0.2s;
    }

    .country-option:hover {
        background: #f5f5f5;
    }

    .btn {
        width: 100%;
        padding: 16px 20px;
        font-size: 1.1rem;
        font-weight: 500;
        border-radius: 200px;
        cursor: pointer;
        transition: all 0.3s ease;
        font-family: 'Lexend', sans-serif;
        border: none;
        margin-top: 0;
        text-decoration: none;
        display: inline-block;
        text-align: center;
        flex-shrink: 0;
    }

    .btn-primary {
        background-color: #6F4D38;
        color: white;
        box-shadow: 0 4px 15px rgba(111, 77, 56, 0.3);
    }

    .btn-primary:hover:not(:disabled) {

        background-color: #5a3f2d;
    }

    .btn-primary:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }

    .btn-secondary {
        background-color: white;
        color: #6F4D38;
        border: 2px solid #6F4D38;
    }

    .btn-secondary:hover {
        background-color: #f9f5f2;
        transform: translateY(-2px);
    }

        display: inline-block;
        width: 20px;
        height: 20px;
        border: 2px solid #ffffff;
        border-top-color: transparent;
        border-radius: 50%;

        margin-left: 10px;

<body>
    <div class="container">
        <div class="image-container">
            <img src="img/bg1.jpg" alt="Modern workspace" class="active">
            <img src="img/bg2.jpg" alt="Team collaboration">
            <img src="img/bg1.jpg" alt="Creative meeting">
            <img src="img/bg2.jpg" alt="Team collaboration">
        </div>

        <div class="content-container">
            <div class="header-section">
                <h1 class="page-title">Create Account</h1>
                <div class="profile-upload" id="profileUpload" onclick="document.getElementById('profileInput').click()">
                    <img src="img/profileicon.jpg" alt="Upload Profile" id="profileImg">
                    <input type="file" id="profileInput" accept="image/*" style="display: none;">
                </div>
            </div>

            <form class="signup-form" id="signupForm">
                <div class="input-group">
                    <input type="email" class="input-field" id="emailInput" placeholder="Email Address" required>
                </div>

                <div class="input-group">
                    <input type="password" class="input-field" id="passwordInput" placeholder="Password" required minlength="6">
                </div>

                <div class="input-group" style="position: relative;">
                    <div class="phone-input-wrapper">
                        <div class="country-select" onclick="toggleDropdown()">
                            <img src="https://flagcdn.com/w40/ng.png" alt="Nigeria" class="country-flag" id="selectedFlag">
                            <span class="country-code" id="selectedCode">+234</span>
                            <svg class="dropdown-arrow" viewBox="0 0 24 24">
                                <path d="M7 10l5 5 5-5z"/>
                            </svg>
                        </div>
                        <div class="divider"></div>
                        <input type="tel" class="phone-input" id="phoneInput" placeholder="Phone Number" required>
                    </div>
                    
                    <div class="country-dropdown" id="countryDropdown">
                        <div class="country-option" onclick="selectCountry('ng', '+234')">
                            <img src="https://flagcdn.com/w40/ng.png" alt="Nigeria" class="country-flag">
                            <span>Nigeria (+234)</span>
                        </div>
                        <div class="country-option" onclick="selectCountry('us', '+1')">
                            <img src="https://flagcdn.com/w40/us.png" alt="USA" class="country-flag">
                            <span>USA (+1)</span>
                        </div>
                        <div class="country-option" onclick="selectCountry('gb', '+44')">
                            <img src="https://flagcdn.com/w40/gb.png" alt="UK" class="country-flag">
                            <span>UK (+44)</span>
                        </div>
                        <div class="country-option" onclick="selectCountry('gh', '+233')">
                            <img src="https://flagcdn.com/w40/gh.png" alt="Ghana" class="country-flag">
                            <span>Ghana (+233)</span>
                        </div>
                        <div class="country-option" onclick="selectCountry('za', '+27')">
                            <img src="https://flagcdn.com/w40/za.png" alt="South Africa" class="country-flag">
                            <span>South Africa (+27)</span>
                        </div>
                    </div>
                </div>

                <div class="error-message" id="errorMessage"></div>
                <div class="success-message" id="successMessage"></div>

                <button type="submit" class="btn btn-primary" id="doneBtn">Done</button>
                <button style="border: none; color: black; font-weight: 100;" type="button" class="btn btn-secondary" onclick="window.location.href='index.html'">Cancel</button>
            </form>
        </div>
    </div>

        images[currentImage].classList.remove('active');
        currentImage = (currentImage + 1) % images.length;
        images[currentImage].classList.add('active');
    }, 3000);

    // Phone dropdown
    function toggleDropdown() {
        document.getElementById('countryDropdown').classList.toggle('active');
    }

    function selectCountry(code, phoneCode) {
        document.getElementById('selectedFlag').src = `https://flagcdn.com/w40/${code}.png`;
        document.getElementById('selectedCode').textContent = phoneCode;
        document.getElementById('countryDropdown').classList.remove('active');
    }

    document.addEventListener('click', function(e) {
        if (!e.target.closest('.country-select') && !e.target.closest('.country-dropdown')) {
            document.getElementById('countryDropdown').classList.remove('active');
        }
    });

    // Profile image
    let uploadedProfileImage = null;
    document.getElementById('profileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            if (file.size > 2 * 1024 * 1024) {
                showError('Image size must be less than 2MB');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('profileImg').src = e.target.result;
                document.getElementById('profileUpload').classList.add('has-image');
                uploadedProfileImage = file;
            };
            reader.readAsDataURL(file);
        }
    });

    function showError(message) {
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        errorMessage.textContent = message;
        errorMessage.classList.add('show');
        successMessage.classList.remove('show');
    }

    function showSuccess(message) {
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        successMessage.textContent = message;
        successMessage.classList.add('show');
        errorMessage.classList.remove('show');
    }

    function resetButton() {
        const doneBtn = document.getElementById('doneBtn');
        doneBtn.disabled = false;
        doneBtn.innerHTML = 'Done';
    }

    // COMPLETE FIXED SIGNUP FORM
    document.getElementById('signupForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const doneBtn = document.getElementById('doneBtn');
        const email = document.getElementById('emailInput').value.trim().toLowerCase();
        const password = document.getElementById('passwordInput').value;
        const phoneCode = document.getElementById('selectedCode').textContent;
        const phoneNumber = document.getElementById('phoneInput').value.trim();
        const fullPhoneNumber = phoneCode + phoneNumber;

        console.log('Signup started:', { email, phoneNumber });

        // Validation
        if (!email || !password || !phoneNumber || password.length < 6 || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            showError('Please fill all fields correctly');
            return;
        }

        doneBtn.disabled = true;
        doneBtn.innerHTML = 'Creating account... <span class="spinner"></span>';

        try {
            // 1. Generate OTP
            const otpCode = Math.floor(100000 + Math.random() * 900000).toString();
            console.log('Generated OTP:', otpCode);

            // 2. Avatar upload (works or skips)
            let avatarUrl = null;
            if (uploadedProfileImage) {
                console.log('Uploading avatar...');
                try {
                    const fileExt = uploadedProfileImage.name.split('.').pop() || 'jpg';
                    const fileName = `${Date.now()}-${Math.random().toString(36).substring(2, 9)}.${fileExt}`;
                    
                    const { data: uploadData, error: uploadError } = await supabaseClient.storage
                        .from('avatars')
                        .upload(fileName, uploadedProfileImage, {
                            cacheControl: '3600',
                            upsert: false
                        });
                    
                    if (!uploadError && uploadData) {
                        const { data: urlData } = supabaseClient.storage
                            .from('avatars')
                            .getPublicUrl(fileName);
                        avatarUrl = urlData.publicUrl;
                        console.log('Avatar uploaded:', avatarUrl);
                    }
                } catch (uploadErr) {
                    console.warn('Avatar upload failed, continuing without:', uploadErr.message);
                }
            }

            // 3. SEND OTP via Railway API (FIXED URL)
            console.log('Sending OTP to:', email);
            const emailResponse = await fetch(`${EMAIL_API_URL}/send-otp`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, otp: otpCode })
            });

            const emailResult = await emailResponse.json();
            console.log('Email API response:', emailResult);
            
            if (!emailResponse.ok || !emailResult.success) {
                throw new Error(`OTP failed: ${emailResult.error || emailResponse.statusText}`);
            }

            // 4. Store in localStorage
            localStorage.setItem('pendingEmail', email);
            localStorage.setItem('pendingPassword', password);
            localStorage.setItem('pendingPhone', fullPhoneNumber);
            localStorage.setItem('pendingAvatarUrl', avatarUrl || '');
            localStorage.setItem('pendingOtp', otpCode);

            console.log('Stored in localStorage, redirecting...');
            showSuccess('Verification code sent! Check your email.');
            
            setTimeout(() => {
                window.location.href = 'confirmotp.html';
            }, 1500);

        } catch (error) {
            console.error('Signup error:', error);
            showError(error.message || 'Signup failed. Check console (F12).');
            resetButton();
        }
    });
</script>
</body>
</html>
